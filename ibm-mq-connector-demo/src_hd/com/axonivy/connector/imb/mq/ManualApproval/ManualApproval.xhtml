<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/basic-10.xhtml">
    <ui:define name="title">Manual Approval</ui:define>
    <ui:define name="content">
	<div class="card p-4 bg-gray-50 border-1 border-gray-200 border-round p-5 mx-auto" style="max-width: 450px;">

    <h2 class="mt-0 mb-4">IBM MQ Messaging</h2>
    <h:form id="approvalForm">

        <!-- Applicant -->
    <h3 class="mb-3">Applicant</h3>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">     	
        <span>First name</span>
        <h:outputLabel for="firstname" value="#{data.taskDetail.loanApplication.applicant.name.first}" />
    </div>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Last name</span>
        <h:outputLabel for="lastname" value="#{data.taskDetail.loanApplication.applicant.name.last}" />
    </div>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Date of birth</span>
        <h:outputLabel for="dateOfBirth" value="#{data.taskDetail.loanApplication.applicant.dateOfBirth}" />
    </div>

    <div class="flex justify-content-between py-2 mb-4">
        <span>Monthly net income</span>
        <span>EUR <h:outputLabel for="monthlyNetIncome" value="#{data.taskDetail.loanApplication.applicant.monthlyNetIncome}" /> </span>        
    </div>

    <!-- Loan Request -->
    <h3 class="mb-3">Loan Request</h3>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Purpose</span>        
        <h:outputLabel for="purpose" value="#{data.taskDetail.loanApplication.loanRequest.purpose}" />
    </div>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Amount</span>
        <span>EUR <h:outputLabel for="amount" value="#{data.taskDetail.loanApplication.loanRequest.amount}" /> </span>
    </div>

    <div class="flex justify-content-between py-2 mb-4">
        <span>Term</span>
        <span> <h:outputLabel for="termMonths" value="#{data.taskDetail.loanApplication.loanRequest.termMonths}" /> Months </span>
    </div>

    <!-- Credit Score -->
    <h3 class="mb-3">Credit Score</h3>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Score</span>
        <h:outputLabel for="score" value="#{data.taskDetail.loanApplication.creditScore.score}" />        
    </div>

    <div class="flex justify-content-between py-2 border-bottom-1 surface-border">
        <span>Score class</span>
        <h:outputLabel for="scoreClass" value="#{data.taskDetail.loanApplication.creditScore.scoreClass}" />        
    </div>

    <div class="flex justify-content-between py-2 mb-5">
        <span>Provider</span>
        <h:outputLabel for="provider" value="#{data.taskDetail.loanApplication.creditScore.provider}" />        
    </div>

    <!-- Buttons -->
    <div class="flex justify-content-end gap-2">
            <p:commandButton
                value="Reject"
                icon="pi pi-times"
                styleClass="text-900 bg-white border-1 border-white" 
                action="#{logic.submit('REJECT')}" />

            <p:commandButton
                value="Confirm"
                icon="pi pi-check" 
                update="approvalForm"
                action="#{logic.submit('CONFIRM')}" />

    </div>

</h:form>
</div>
    </ui:define>
  </ui:composition>
</h:body>

</html>
