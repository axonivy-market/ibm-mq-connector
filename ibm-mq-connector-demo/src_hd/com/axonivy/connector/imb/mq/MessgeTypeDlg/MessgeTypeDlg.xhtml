<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/basic-10.xhtml">
		<ui:define name="title">MessgeTypeDlg</ui:define>
		<ui:define name="content">
			<div style="height: 800px;">
				<div class="bg-gray-50 border-1 border-gray-200 border-round p-5">
					<h:form id="form">
						<div class="grid justify-content-center">
							<div class="col" style="max-width: 450px;">
								<p:messages id="errorMessageType" autoUpdate="true" />
								<h2>IBM MQ Messaging</h2>
								<div style="font-size: 15px">To start message fetching,
									select file format:</div>
								<br />
								<div>
									<p:outputLabel for="@next" value="File format:" />
									
								</div>								
								<div style="margin-top: 8px">
									<p:selectOneMenu id="option" required="true"
										value="#{data.loanRequest.messageType}"
										style="width:440px">
										<f:selectItem itemLabel="Select" itemValue="" />
										<f:selectItem itemLabel="JSON" itemValue="json" />
										<f:selectItem itemLabel="XML" itemValue="xml" />
									</p:selectOneMenu>
								</div>
								<br />
								<div class="command-btns">
									<p:commandLink id="cancel"
										actionListener="#{ivyWorkflowView.cancel()}" process="@this"
										value="Cancel" />
									<p:commandButton id="proceed" actionListener="#{logic.fetchMessages(data.loanRequest)}"
										value="Process" update="form" icon="pi pi-check" />
								</div>

							</div>
						</div>

					</h:form>
				</div>
			</div>
		</ui:define>
	</ui:composition>
</h:body>

</html>
