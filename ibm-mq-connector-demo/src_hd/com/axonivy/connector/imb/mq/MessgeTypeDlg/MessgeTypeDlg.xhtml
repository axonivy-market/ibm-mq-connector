<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/basic-10.xhtml">
		<ui:define name="title">MessgeTypeDlg</ui:define>
		<ui:define name="content">
		<h:form id="form">
			<div style="height: 800px;">
				<div class="bg-gray-50 border-1 border-gray-200 border-round p-5">
					
						<div class="grid justify-content-center">
							<div class="col" style="max-width: 450px;">																
								<h2><h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/connector/ibmMq/demo/messageType/title')}" /> </h2>
								<div style="font-size: 15px"><h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/connector/ibmMq/demo/messageType/desc')}" /> </div>
								<br />
								<div>
									<p:outputLabel for="@next" value="#{ivy.cms.co('/Dialogs/com/axonivy/connector/ibmMq/demo/messageType/fileFormat')}" />
								</div>								
								<div style="margin-top: 8px">
									<p:selectOneMenu id="option" required="true"
										value="#{data.messageFetchRequest.messageType}"
										style="width:440px">
										<f:selectItem itemLabel="Select" itemValue="" />
										<f:selectItem itemLabel="JSON" itemValue="json" />
										<f:selectItem itemLabel="XML" itemValue="xml" />
									</p:selectOneMenu>
								</div>
								<br />
								<div class="command-btns">
									<p:commandLink id="cancel"
										actionListener="#{ivyWorkflowView.cancel()}" process="@this"
										value="#{ivy.cms.co('/Dialogs/com/axonivy/connector/ibmMq/demo/messageType/cancelBtn')}" />
									<p:commandButton id="proceed" actionListener="#{logic.fetchMessages(data.messageFetchRequest)}"
										value="#{ivy.cms.co('/Dialogs/com/axonivy/connector/ibmMq/demo/messageType/processBtn')}" update="form" icon="pi pi-check" />
								</div>

							</div>
						</div>					
				</div>
				<div class="flex justify-content-between py-2 surface-border">     	
    	    	<p:messages id="manualMessage" showIcon="false" row="5" />
    		</div>
			</div>
		</h:form>	
		</ui:define>
	</ui:composition>
</h:body>

</html>
